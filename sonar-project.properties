# Configuration for SonarCloud analysis

# Project identification
sonar.projectKey=kindred-98_StockGuard
sonar.organization=kindred-98
sonar.projectName=StockGuard
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=stockguard
sonar.tests=tests

# Python configuration
sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Exclude generated code and cache
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/**
